<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculadora do Beta</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --gold: #FFD700;
    --dark: #0a0a0f;
    --card: #12121a;
    --accent: #ff4d6d;
    --green: #39ff14;
  }

  body {
    background: var(--dark);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Nunito', sans-serif;
    overflow: hidden;
    position: relative;
  }

  /* Background stars */
  .stars {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
  }
  .star {
    position: absolute;
    background: white;
    border-radius: 50%;
    animation: twinkle var(--d, 3s) infinite alternate;
  }
  @keyframes twinkle {
    from { opacity: 0.1; transform: scale(0.8); }
    to   { opacity: 0.9; transform: scale(1.2); }
  }

  .container {
    position: relative;
    z-index: 1;
    width: min(480px, 95vw);
    background: var(--card);
    border-radius: 24px;
    padding: 40px 36px;
    border: 2px solid rgba(255,215,0,0.25);
    box-shadow: 0 0 60px rgba(255,215,0,0.08), 0 20px 60px rgba(0,0,0,0.6);
    animation: fadeIn 0.8s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(30px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(2rem, 8vw, 3.2rem);
    color: var(--gold);
    text-align: center;
    letter-spacing: 3px;
    line-height: 1;
    text-shadow: 0 0 30px rgba(255,215,0,0.5);
    margin-bottom: 6px;
  }

  .subtitle {
    text-align: center;
    color: rgba(255,255,255,0.4);
    font-size: 0.85rem;
    margin-bottom: 36px;
    letter-spacing: 1px;
  }

  .field {
    margin-bottom: 20px;
  }

  label {
    display: block;
    font-size: 0.78rem;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.5);
    margin-bottom: 8px;
  }

  input {
    width: 100%;
    background: rgba(255,255,255,0.05);
    border: 2px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    padding: 14px 18px;
    color: white;
    font-family: 'Nunito', sans-serif;
    font-size: 1.05rem;
    font-weight: 700;
    transition: all 0.3s;
    outline: none;
  }

  input:focus {
    border-color: var(--gold);
    background: rgba(255,215,0,0.05);
    box-shadow: 0 0 20px rgba(255,215,0,0.15);
  }

  input::placeholder { color: rgba(255,255,255,0.2); font-weight: 400; }

  .btn {
    width: 100%;
    margin-top: 10px;
    padding: 16px;
    background: linear-gradient(135deg, #FFD700, #FF8C00);
    border: none;
    border-radius: 14px;
    color: #0a0a0f;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.4rem;
    letter-spacing: 3px;
    cursor: pointer;
    transition: all 0.3s;
    box-shadow: 0 4px 24px rgba(255,165,0,0.3);
  }

  .btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 32px rgba(255,165,0,0.5);
  }

  .btn:active { transform: translateY(0); }

  /* Result */
  .result {
    display: none;
    margin-top: 30px;
    border-radius: 16px;
    padding: 28px 24px;
    text-align: center;
    animation: popIn 0.5s cubic-bezier(0.34,1.56,0.64,1);
  }

  @keyframes popIn {
    from { opacity: 0; transform: scale(0.7); }
    to   { opacity: 1; transform: scale(1); }
  }

  .result.win {
    background: linear-gradient(135deg, rgba(57,255,20,0.12), rgba(0,200,80,0.08));
    border: 2px solid rgba(57,255,20,0.4);
  }

  .result.lose {
    background: linear-gradient(135deg, rgba(255,77,109,0.12), rgba(200,0,50,0.08));
    border: 2px solid rgba(255,77,109,0.4);
  }

  .result-emoji {
    font-size: 3.5rem;
    display: block;
    margin-bottom: 12px;
    animation: bounce 1s infinite alternate;
  }

  @keyframes bounce {
    from { transform: translateY(0); }
    to   { transform: translateY(-8px); }
  }

  .result-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(1.4rem, 6vw, 2rem);
    letter-spacing: 2px;
    margin-bottom: 8px;
  }

  .result.win  .result-title { color: var(--green); text-shadow: 0 0 20px rgba(57,255,20,0.6); }
  .result.lose .result-title { color: var(--accent); text-shadow: 0 0 20px rgba(255,77,109,0.6); }

  .result-msg {
    color: rgba(255,255,255,0.7);
    font-size: 0.95rem;
    font-weight: 700;
    line-height: 1.5;
  }

  /* confetti */
  .confetti-piece {
    position: fixed;
    width: 10px;
    height: 10px;
    border-radius: 2px;
    top: -20px;
    animation: fall linear forwards;
    z-index: 999;
    pointer-events: none;
  }

  @keyframes fall {
    0%   { transform: translateY(0) rotate(0deg); opacity: 1; }
    100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
  }
</style>
</head>
<body>

<div class="stars" id="stars"></div>

<div class="container">
  <h1>CALCULADORA DO BETA</h1>
  <p class="subtitle">⚡ quanto sobrou pro beta? ⚡</p>

  <div class="field">
    <label>👦 Nome do Menino</label>
    <input type="text" id="menino" placeholder="Digite o nome..." />
  </div>

  <div class="field">
    <label>👧 Nome da Menina</label>
    <input type="text" id="menina" placeholder="Digite o nome..." />
  </div>

  <button class="btn" onclick="calcular()">CALCULAR 🔥</button>

  <div class="result" id="result">
    <span class="result-emoji" id="emoji"></span>
    <div class="result-title" id="result-title"></div>
    <div class="result-msg" id="result-msg"></div>
  </div>
</div>

<script>
  // Generate stars
  const starsEl = document.getElementById('stars');
  for (let i = 0; i < 80; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const size = Math.random() * 2.5 + 0.5;
    s.style.cssText = `
      width:${size}px; height:${size}px;
      left:${Math.random()*100}%;
      top:${Math.random()*100}%;
      --d:${(Math.random()*3+1.5).toFixed(1)}s;
      animation-delay:${(Math.random()*3).toFixed(1)}s;
    `;
    starsEl.appendChild(s);
  }

  function normalize(str) {
    return str.trim().toLowerCase()
      .normalize("NFD").replace(/[\u0300-\u036f]/g, "");
  }

  const casosEspeciais = [
    ["christian", "rebecca"],
    ["adryan", "malu"],
    ["camilli", "murilo"],
    ["murilo", "camilli"]
  ];

  function calcular() {
    const menino = normalize(document.getElementById('menino').value);
    const menina = normalize(document.getElementById('menina').value);
    const result  = document.getElementById('result');
    const emoji   = document.getElementById('emoji');
    const title   = document.getElementById('result-title');
    const msg     = document.getElementById('result-msg');

    if (!menino || !menina) {
      result.className = 'result lose';
      result.style.display = 'block';
      emoji.textContent = '😐';
      title.textContent = 'PREENCHA OS DOIS NOMES';
      msg.textContent = 'Coloca o nome do menino e da menina pra calcular!';
      return;
    }

    const especial = casosEspeciais.some(([m, f]) => menino === m && menina === f);

    // Limpa confetes antigos
    document.querySelectorAll('.confetti-piece').forEach(e => e.remove());

    if (especial) {
      result.className = 'result win';
      result.style.display = 'block';
      emoji.textContent = '🏆';
      title.textContent = 'SOBROU TUDO!!!';
      msg.textContent = `MEU DEUS, está sobrando alguma coisa pro beta... SOBROU TUDO!!! 😱🔥`;
      spawnConfetti();
    } else {
      result.className = 'result lose';
      result.style.display = 'block';
      emoji.textContent = '💀';
      title.textContent = 'NÃO SOBROU NADA PRO BETA';
      msg.textContent = `Vocês dois nunca vão ficar juntos. Não sobrou nada.`;
    }
  }

  function spawnConfetti() {
    const colors = ['#FFD700','#FF4D6D','#39FF14','#00CFFF','#FF8C00','#FF69B4'];
    for (let i = 0; i < 80; i++) {
      const c = document.createElement('div');
      c.className = 'confetti-piece';
      c.style.cssText = `
        left:${Math.random()*100}vw;
        background:${colors[Math.floor(Math.random()*colors.length)]};
        width:${Math.random()*10+5}px;
        height:${Math.random()*10+5}px;
        animation-duration:${(Math.random()*2+1.5).toFixed(1)}s;
        animation-delay:${(Math.random()*0.8).toFixed(2)}s;
        border-radius:${Math.random()>0.5?'50%':'2px'};
      `;
      document.body.appendChild(c);
      c.addEventListener('animationend', () => c.remove());
    }
  }

  // Enter key support
  document.querySelectorAll('input').forEach(inp => {
    inp.addEventListener('keydown', e => { if (e.key === 'Enter') calcular(); });
  });
</script>
</body>
</html>
